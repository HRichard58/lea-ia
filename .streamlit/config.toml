# .streamlit/config.toml
[theme]
primaryColor = "#1E88E5"        # Bleu principal (boutons, liens)
backgroundColor = "#050424"      # Fond de page
secondaryBackgroundColor = "#F5F7FA"  # Fond des widgets/sidebar
textColor = "#FFFFFF"           # Couleur du texte
font = "sans serif"              # Police : sans serif, serif, ou monospace

[server]
headless = true                  # Mode sans navigateur (pour Docker)
port = 8501
enableCORS = false
maxUploadSize = 200              # Taille max d'upload en Mo

[browser]
gatherUsageStats = false         # Désactiver la télémétrie

[runner]
magicEnabled = false             # Désactiver l'écriture magique pour plus de contrôle
